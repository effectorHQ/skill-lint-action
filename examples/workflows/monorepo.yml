# Monorepo Usage — validate multiple skills in one repo
#
# Use this if your repo has multiple skills under a skills/ directory:
#
#   skills/
#     notion-sync/SKILL.md
#     docker-manager/SKILL.md
#     jira-triage/SKILL.md
#
# The action will scan and validate all SKILL.md files it finds.

name: Lint All Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**/SKILL.md'
  pull_request:
    paths:
      - 'skills/**/SKILL.md'

jobs:
  lint:
    name: Validate all SKILL.md files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint all skills
        id: lint
        uses: OpenClawHQ/skill-lint-action@v1
        with:
          path: 'skills/'
          fail-on-warnings: 'false'   # set to 'true' for stricter enforcement

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const errors = '${{ steps.lint.outputs.errors }}';
            const warnings = '${{ steps.lint.outputs.warnings }}';
            const files = '${{ steps.lint.outputs.files-checked }}';
            const status = errors > 0 ? '❌ Failed' : warnings > 0 ? '⚠️ Passed with warnings' : '✅ Passed';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🦞 Skill Lint Results\n\n${status}\n\n| | |\n|---|---|\n| Files checked | ${files} |\n| Errors | ${errors} |\n| Warnings | ${warnings} |`
            });
